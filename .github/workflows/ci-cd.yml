name: CI/CD

# Single combined pipeline: test -> build data from published issues ->
# stamp the build id -> deploy to GitHub Pages.
on:
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  pull_request:
    paths-ignore: ["**.md"]
  # Rebuild when reviews are published/unpublished or edited.
  issues:
    types: [closed, reopened, labeled, unlabeled, edited, deleted]
  workflow_dispatch:
  # Daily refresh so edits to already-published issues eventually show up.
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Test & build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # renovate: datasource=node-version depName=node
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build data from published issues
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Stamp build id (busts the service-worker cache every commit)
        run: |
          BUILD_ID="${GITHUB_SHA::12}-$(date -u +%Y%m%d%H%M%S)"
          echo "Stamping BUILD_ID=$BUILD_ID"
          sed -i "s/__BUILD_ID__/$BUILD_ID/g" \
            service-worker.js src/main.js data/beans.json

      - name: Assemble site directory
        run: |
          mkdir -p _site
          cp -r index.html 404.html styles.css manifest.webmanifest service-worker.js \
            robots.txt sitemap.xml CNAME src data icons bean _site/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
